- type: entity
  parent: SimpleMobBase
  name: brain slug
  id: MobBrainSlug
  suffix: qweqwe
  components:
    - type: CollectiveMind
      channel: Slug
      channelColor: "#8a0303"
    - type: BrainSlug ## first
    - type: BrainHugging ## second
      paralyzeTime: 3
      chansePounce: 100
    - type: Sprite
      sprite: Mobs/Aliens/brainslug.rsi
      drawdepth: SmallMobs
      noRot: true
      layers:
        - map: [ "enum.DamageStateVisualLayers.Base" ]
          state: alive
    - type: DamageStateVisuals
      states:
        Alive:
          Base: alive
        Dead:
          Base: dead
    # - type: Vocal
    #   sounds:
    #     Unsexed: BrainSlugEmote
    - type: Item
    - type: Physics
      bodyType: Dynamic
    - type: Fixtures
      fixtures:
        fix1:
          shape:
            !type:PhysShapeCircle
            radius: 0.2
          density: 100
          mask:
            - SmallMobMask
          layer:
            - SmallMobLayer
    - type: Speech
    - type: Bloodstream
      bloodMaxVolume: 10
      bloodReagent: Blood
    - type: GhostRole
      allowMovement: true
      allowSpeech: true
      makeSentient: true
      name: brainslug
      description: brainslug
      rules: brainslug
    - type: GhostTakeoverAvailable
    - type: MeleeWeapon
      hidden: true
      soundHit:
        path: /Audio/Effects/bite.ogg
      angle: 0
      animation: WeaponArcBite
      damage:
        types:
          Piercing: 2
    - type: MobThresholds
      thresholds:
        0: Alive
        25: Dead
    - type: MovementSpeedModifier
      baseWalkSpeed: 3
      baseSprintSpeed: 4
    - type: Tag
      tags:
        - CannotSuicide
    - type: NoSlip
    # - type: TypingIndicator
    #   proto: slug

- type: instantAction
  id: ReleaseControlAction
  icon: Interface/Actions/brainslug.rsi/borer_brain_out.png
  name: Release
  description: Release
  serverEvent: !type:ReleaseControlActionEvent
  useDelay: 2
  priority: -19