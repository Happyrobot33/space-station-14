- type: entity
  id: ActionStoreSlug
  name: Shop
  description: Opens the ability shop.
  components:
  - type: InstantAction
    icon: Interface/Actions/shop.png
    event: !type:StoreActionEvent

- type: entity
  id: ActionBrainSlugJump
  name: Jump
  description: "Brain slug jump."
  categories: [ HideSpawnMenu ]
  components:
  - type: WorldTargetAction
    itemIconStyle: NoItem
    icon:
      sprite: Interface/Actions/brainslug.rsi
      state: borer_jump
    event:
      !type:BrainSlugJumpActionEvent
    useDelay: 2
    range: 160
    
